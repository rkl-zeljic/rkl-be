        - createIndex:
            tableName: fakture
            indexName: ix_fakture_porucilac
            columns:
              - column:
                  name: porucilac
        - createIndex:
            tableName: fakture
            indexName: ix_fakture_status
            columns:
              - column:
                  name: status

  # ── Label ─────────────────────────────────────────────────────────────
  - changeSet:
      id: 001-create-labels
      author: rkl
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: labels
      changes:
        - createTable:
            tableName: labels
