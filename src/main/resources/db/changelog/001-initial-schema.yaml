              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: broj_fakture
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: porucilac
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: datum_od
