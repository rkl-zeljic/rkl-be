                  constraints:
                    nullable: false
              - column:
                  name: datum_do
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: datum_slanja
                  type: date
              - column:
                  name: napomena
                  type: varchar(255)
              - column:
                  name: created_by
                  type: varchar(255)
              - column:
