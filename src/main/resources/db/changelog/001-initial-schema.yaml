databaseChangeLog:

  # ── RklUser (uses SEQUENCE strategy) ──────────────────────────────────
  - changeSet:
      id: 001-create-rkl-user-seq
      author: rkl
      preConditions:
        - onFail: MARK_RAN
        - not:
            - sequenceExists:
                sequenceName: rkl_user_seq
      changes:
        - createSequence:
            sequenceName: rkl_user_seq
            startValue: 1
            incrementBy: 50

  - changeSet:
      id: 001-create-rkl-user
      author: rkl
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: rkl_user
      changes:
        - createTable:
            tableName: rkl_user
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: driver_name
                  type: varchar(255)
              - column:
                  name: signature
                  type: text
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: rkl_user
            columnNames: email
            constraintName: user_email_unique

  # ── ImportedFile ──────────────────────────────────────────────────────
  - changeSet:
      id: 001-create-imported-files
      author: rkl
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: imported_files
      changes:
        - createTable:
            tableName: imported_files
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: original_filename
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: blob_name
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: file_size
                  type: bigint
              - column:
                  name: content_type
                  type: varchar(255)
              - column:
                  name: uploaded_by
                  type: varchar(255)
              - column:
                  name: record_count
                  type: int
              - column:
                  name: created_at
                  type: timestamp

  # ── Merenje ───────────────────────────────────────────────────────────
  - changeSet:
      id: 001-create-merenja
      author: rkl
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: merenja
      changes:
        - createTable:
            tableName: merenja
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: imported_file_id
                  type: bigint
              - column:
                  name: datum_izvestaja
                  type: date
              - column:
                  name: merni_list_br
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: posiljalac
                  type: varchar(255)
              - column:
                  name: porucilac
                  type: varchar(255)
              - column:
                  name: primalac
                  type: varchar(255)
              - column:
                  name: roba
                  type: varchar(255)
              - column:
                  name: bruto
                  type: double
              - column:
                  name: tara
                  type: double
              - column:
                  name: neto
                  type: double
              - column:
                  name: prevoznik
                  type: varchar(255)
              - column:
                  name: registracija
                  type: varchar(255)
              - column:
                  name: vozac
                  type: varchar(255)
              - column:
                  name: vozac_user_id
                  type: bigint
              - column:
                  name: mesto
                  type: varchar(255)
              - column:
                  name: potpis
                  type: varchar(255)
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: updated_at
                  type: timestamp
        - addUniqueConstraint:
            tableName: merenja
            columnNames: datum_izvestaja, merni_list_br
            constraintName: ux_merenja_datum_merni
        - addForeignKeyConstraint:
            baseTableName: merenja
            baseColumnNames: imported_file_id
            referencedTableName: imported_files
            referencedColumnNames: id
            constraintName: fk_merenja_imported_file
        - addForeignKeyConstraint:
            baseTableName: merenja
            baseColumnNames: vozac_user_id
            referencedTableName: rkl_user
            referencedColumnNames: id
            constraintName: fk_merenja_vozac_user
        - createIndex:
            tableName: merenja
            indexName: ix_merenja_datum
            columns:
              - column:
                  name: datum_izvestaja
        - createIndex:
            tableName: merenja
            indexName: ix_merenja_roba
            columns:
              - column:
                  name: roba
        - createIndex:
            tableName: merenja
            indexName: ix_merenja_registracija
            columns:
              - column:
                  name: registracija
        - createIndex:
            tableName: merenja
            indexName: ix_merenja_vozac_user
            columns:
              - column:
                  name: vozac_user_id

  # ── Faktura ──────────────────────────────────────────────────────────
  - changeSet:
      id: 001-create-fakture
      author: rkl
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: fakture
      changes:
        - createTable:
            tableName: fakture
