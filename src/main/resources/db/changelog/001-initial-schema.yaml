              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: column_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: canonical_value
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: updated_at
                  type: timestamp
        - addUniqueConstraint:
            tableName: labels
            columnNames: column_name, canonical_value
            constraintName: ux_labels_column_canonical
        - createIndex:
            tableName: labels
            indexName: ix_labels_column
            columns:
              - column:
                  name: column_name

  - changeSet:
      id: 001-create-label-variations
      author: rkl
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: label_variations
      changes:
        - createTable:
            tableName: label_variations
            columns:
              - column:
                  name: label_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: variation
                  type: varchar(255)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: label_variations
            baseColumnNames: label_id
            referencedTableName: labels
            referencedColumnNames: id
            constraintName: fk_label_variations_label
        - createIndex:
            tableName: label_variations
            indexName: ix_label_variations_value
            columns:
              - column:
                  name: variation

